openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Small Claims Genie API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: claims
    description: Small claims case management
  - name: dashboard
    description: Dashboard and summary endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List all claims
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, filed, served, hearing_scheduled, resolved]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  claims:
                    type: array
                    items:
                      $ref: "#/components/schemas/Claim"
                  total:
                    type: integer
                required:
                  - claims
                  - total
    post:
      operationId: createClaim
      tags: [claims]
      summary: Create a new claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimBody"
      responses:
        "201":
          description: Claim created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  /claims/{id}:
    get:
      operationId: getClaim
      tags: [claims]
      summary: Get a single claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "404":
          description: Not found
    put:
      operationId: updateClaim
      tags: [claims]
      summary: Update a claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClaimBody"
      responses:
        "200":
          description: Claim updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "404":
          description: Not found
    delete:
      operationId: deleteClaim
      tags: [claims]
      summary: Delete a claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityItem"
                required:
                  - activities

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Claim:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [draft, filed, served, hearing_scheduled, resolved]
        courtName:
          type: string
        courtAddress:
          type: string
        caseNumber:
          type: string
        plaintiffName:
          type: string
        plaintiffAddress:
          type: string
        plaintiffCity:
          type: string
        plaintiffState:
          type: string
        plaintiffZip:
          type: string
        plaintiffPhone:
          type: string
        plaintiffEmail:
          type: string
        defendantName:
          type: string
        defendantAddress:
          type: string
        defendantCity:
          type: string
        defendantState:
          type: string
        defendantZip:
          type: string
        defendantPhone:
          type: string
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimDate:
          type: string
          format: date
        filingReasonLocation:
          type: string
          enum:
            - defendant_residence
            - defendant_business
            - contract_signed
            - contract_performed
            - property_damaged
            - plaintiff_injured
            - buyer_signed_contract
            - other
        filingReasonZip:
          type: string
        isAttorneyClientDispute:
          type: boolean
        isSuingPublicEntity:
          type: boolean
        publicEntityClaimDate:
          type: string
          format: date
        hasFiledMoreThan12:
          type: boolean
        isClaimMoreThan2500:
          type: boolean
        trialDate:
          type: string
          format: date
        trialTime:
          type: string
        trialDepartment:
          type: string
        numberOfDefendants:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - plaintiffName
        - defendantName
        - claimAmount
        - claimDescription
        - createdAt
        - updatedAt

    CreateClaimBody:
      type: object
      properties:
        courtName:
          type: string
        courtAddress:
          type: string
        plaintiffName:
          type: string
        plaintiffAddress:
          type: string
        plaintiffCity:
          type: string
        plaintiffState:
          type: string
        plaintiffZip:
          type: string
        plaintiffPhone:
          type: string
        plaintiffEmail:
          type: string
        defendantName:
          type: string
        defendantAddress:
          type: string
        defendantCity:
          type: string
        defendantState:
          type: string
        defendantZip:
          type: string
        defendantPhone:
          type: string
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimDate:
          type: string
          format: date
        filingReasonLocation:
          type: string
          enum:
            - defendant_residence
            - defendant_business
            - contract_signed
            - contract_performed
            - property_damaged
            - plaintiff_injured
            - buyer_signed_contract
            - other
        filingReasonZip:
          type: string
        isAttorneyClientDispute:
          type: boolean
        isSuingPublicEntity:
          type: boolean
        publicEntityClaimDate:
          type: string
          format: date
        hasFiledMoreThan12:
          type: boolean
        isClaimMoreThan2500:
          type: boolean
        numberOfDefendants:
          type: integer
      required:
        - plaintiffName
        - defendantName
        - claimAmount
        - claimDescription

    UpdateClaimBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, filed, served, hearing_scheduled, resolved]
        courtName:
          type: string
        courtAddress:
          type: string
        caseNumber:
          type: string
        plaintiffName:
          type: string
        plaintiffAddress:
          type: string
        plaintiffCity:
          type: string
        plaintiffState:
          type: string
        plaintiffZip:
          type: string
        plaintiffPhone:
          type: string
        plaintiffEmail:
          type: string
        defendantName:
          type: string
        defendantAddress:
          type: string
        defendantCity:
          type: string
        defendantState:
          type: string
        defendantZip:
          type: string
        defendantPhone:
          type: string
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimDate:
          type: string
          format: date
        filingReasonLocation:
          type: string
          enum:
            - defendant_residence
            - defendant_business
            - contract_signed
            - contract_performed
            - property_damaged
            - plaintiff_injured
            - buyer_signed_contract
            - other
        filingReasonZip:
          type: string
        isAttorneyClientDispute:
          type: boolean
        isSuingPublicEntity:
          type: boolean
        publicEntityClaimDate:
          type: string
          format: date
        hasFiledMoreThan12:
          type: boolean
        isClaimMoreThan2500:
          type: boolean
        trialDate:
          type: string
          format: date
        trialTime:
          type: string
        trialDepartment:
          type: string
        numberOfDefendants:
          type: integer

    DashboardSummary:
      type: object
      properties:
        totalClaims:
          type: integer
        draftClaims:
          type: integer
        filedClaims:
          type: integer
        resolvedClaims:
          type: integer
        totalClaimValue:
          type: number
        upcomingHearings:
          type: integer
      required:
        - totalClaims
        - draftClaims
        - filedClaims
        - resolvedClaims
        - totalClaimValue
        - upcomingHearings

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        claimId:
          type: integer
        action:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - claimId
        - action
        - description
        - timestamp
